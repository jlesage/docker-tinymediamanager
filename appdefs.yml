#
# Definitions for tinyMediaManager docker container.
#
# This file is used as data source to generate README.md and unRAID template files
# from Jinja2 templates.
#

app:
  id: 41
  name: tinymediamanager
  friendly_name: tinyMediaManager
  gui_type: x11
  base_os: alpine
  project:
    description: |-
      {{ app.friendly_name }} is a media management tool designed to provide metadata for
      media centers like Kodi (formerly XBMC), Emby, Jellyfin, and Plex.
    url: https://www.tinymediamanager.org
  unraid:
    support_url: https://forums.unraid.net/topic/68916-support-tinymediamanager/
    category: "MediaApp:Other"
  documentation:
  changelog:
    - version: 26.04.1
      date: 2026-04-15
      changes:
        - 'Updated tinyMediaManager to version 5.2.11.'
    - version: 26.03.3
      date: 2026-03-22
      changes:
        - 'Updated tinyMediaManager to version 5.2.10.'
    - version: 26.03.2
      date: 2026-03-18
      changes:
        - 'Updated tinyMediaManager to version 5.2.9.'
    - version: 26.03.1
      date: 2026-03-15
      changes:
        - 'Initial release.'

container:
  storage_permissions: rw

  # Environment variables.
  environment_variables: []

  # Volumes
  volumes: []

  # Network ports
  ports: []

  # Devices
  devices: []
