---

#
# Definitions for tinyMediaManager docker container.
#
# This file is used as data source to generate README.md and unRAID template files
# from Jinja2 templates.
#

app:
  id: 41
  name: tinymediamanager
  friendly_name: tinyMediaManager
  gui_type: x11
  base_os: alpine
  project:
    description: |-
      {{ app.friendly_name }} is a media management tool designed to provide metadata for
      media centers like Kodi (formerly XBMC), Emby, Jellyfin, and Plex.
    url: https://www.tinymediamanager.org
  unraid:
    support_url: https://forums.unraid.net/topic/68916-support-tinymediamanager/
    category: "MediaApp:Other"
  documentation:
  changelog:
    - version: 26.07.1
      date: 2026-07-14
      changes:
        - 'Updated baseimage to version 4.12.6, bringing the following changes:'
        - '2:Added the ability to run the container with read-only filesystem.'
        - '2:Added the ability to configure the shell used by the web terminal.'
        - '2:Enabled window shadows to improve support of GTK4 applications.'
        - '2:Switched to fastcompmgr as the X compositor.'
        - '2:Updated TigerVNC to version 1.16.2.'
        - '2:Updated noVNC to version 1.7.0.'
        - '2:Improved web authentication compatibility with reverse proxies by using relative redirects.'
        - '2:Force usage of the local X display to avoid connecting to the host X server in Docker host network mode.'
        - '2:Fixed regression causing container startup failure when the container engine automatically mounts files under /run.'
    - version: 26.05.1
      date: 2026-05-23
      changes:
        - 'Updated tinyMediaManager to verison 5.2.12.'
    - version: 26.04.1
      date: 2026-04-15
      changes:
        - 'Updated tinyMediaManager to version 5.2.11.'
    - version: 26.03.3
      date: 2026-03-22
      changes:
        - 'Updated tinyMediaManager to version 5.2.10.'
    - version: 26.03.2
      date: 2026-03-18
      changes:
        - 'Updated tinyMediaManager to version 5.2.9.'
    - version: 26.03.1
      date: 2026-03-15
      changes:
        - 'Initial release.'

container:
  storage_permissions: rw

  # Environment variables.
  environment_variables: []

  # Volumes
  volumes: []

  # Network ports
  ports: []

  # Devices
  devices: []
